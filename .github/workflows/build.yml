name: Build EXE with Nuitka

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      AUTH_SERVER_URL: ${{ secrets.AUTH_SERVER_URL }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python numpy sounddevice scipy pywin32 comtypes psutil pyaudiowpatch pystray Pillow winotify mss nuitka ordered-set zstandard cython playwright

      - name: 아이콘 생성
        run: python scripts/make_icon.py

      - name: 버전 정보 생성
        run: python scripts/make_version.py

      - name: SERVER_URL 삽입
        run: python scripts/inject_url.py

      # ── Cython 난독화 빌드 ────────────────────────────────────────────────
      - name: .pyx 파일 준비
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build_cython/gui | Out-Null
          # app_icon은 Cython 제외: Cython 컴파일 시 __file__ 경로 문제로 아이콘 로드 실패
          $rootMods = @("audio_com","audio_capture","log_utils","mem_utils",
                        "processes","win32_utils","updater","auth","db_manager",
                        "video_hash","similarity","series_key")
          foreach ($m in $rootMods) {
            if (Test-Path "$m.py") { Copy-Item "$m.py" "build_cython/$m.pyx" }
          }
          Get-ChildItem gui -Filter "*.py" | ForEach-Object {
            Copy-Item $_.FullName "build_cython/gui/$($_.BaseName).pyx"
          }

      - name: Cython 컴파일 (.pyd 생성)
        run: python setup_cython.py build_ext --inplace

      # ── Nuitka로 EXE 빌드 ────────────────────────────────────────────────
      - name: Nuitka EXE 빌드
        run: >
          python -m nuitka
          --onefile
          --assume-yes-for-downloads
          --enable-plugin=tk-inter
          --windows-console-mode=disable
          --output-filename="Auto Sinc.exe"
          --output-dir=dist
          --windows-icon-from-ico=app.ico
          --file-version=1.5.0.0
          --product-version=1.5.0.0
          --file-description="Auto Sinc"
          --product-name="Auto Sinc"
          --copyright="Sinamon"
          --include-module=app_icon
          --include-module=audio_com
          --include-module=audio_capture
          --include-module=log_utils
          --include-module=mem_utils
          --include-module=processes
          --include-module=win32_utils
          --include-module=updater
          --include-module=auth
          --include-module=db_manager
          --include-module=video_hash
          --include-module=similarity
          --include-module=series_key
          --include-module=gui
          --include-module=gui.base
          --include-module=gui.ui_layout
          --include-module=gui.ui_logic
          --include-module=gui.ui_logic2
          --include-module=gui.ui_logic3
          --include-module=gui.auth
          --include-module=gui.run
          --include-module=gui.run_oped
          --include-module=gui.run_process
          --include-module=gui.run_popup
          --include-module=gui.run_notify
          --include-module=gui.run_refresh
          --include-module=gui.record_open
          --include-module=gui.record_backend
          --include-module=gui._record_impl
          --include-module=cv2
          --include-module=sounddevice
          --include-module=scipy.signal
          --include-module=win32api
          --include-module=win32con
          --include-module=win32gui
          --include-module=tkinter
          --include-module=tkinter.messagebox
          --include-module=tkinter.filedialog
          --include-module=multiprocessing
          --include-module=comtypes
          --include-module=comtypes.client
          --include-module=winreg
          --include-module=psutil
          --include-module=mss
          --include-module=pystray
          --include-module=pystray._win32
          --include-module=pystray._base
          --include-module=pystray._util
          --include-module=six
          --include-package=PIL
          --include-package=playwright
          --include-package-data=playwright
          --include-package-data=cv2
          --include-data-files=lbpcascade_animeface.xml=lbpcascade_animeface.xml
          --include-data-files=app.ico=app.ico
          main.py

      - name: 빌드 결과 확인
        run: dir dist\
        shell: cmd

      - name: EXE 업로드
        uses: actions/upload-artifact@v4
        with:
          name: AutoSync-EXE
          path: dist\Auto Sinc.exe
          retention-days: 3
