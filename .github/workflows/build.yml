name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      AUTH_SERVER_URL: ${{ secrets.AUTH_SERVER_URL }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python numpy sounddevice scipy pywin32 comtypes psutil pyaudiowpatch pystray Pillow winotify mss pyinstaller "pyarmor>=7.0,<8.0"

      - name: ffmpeg 다운로드 (번들용)
        run: |
          curl -L "https://github.com/BtbN/ffmpeg-builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -o ffmpeg.zip
          7z e ffmpeg.zip "*/bin/ffmpeg.exe" -o"." -r
          if not exist ffmpeg.exe (echo "ffmpeg 압축 해제 실패" && exit 1)
          echo "ffmpeg 준비 완료"
        shell: cmd

      - name: 아이콘 생성
        run: python scripts/make_icon.py

      - name: 버전 정보 생성
        run: python scripts/make_version.py

      - name: SERVER_URL 삽입
        run: python scripts/inject_url.py

      # ── 코드 난독화 ───────────────────────────────────────────────────────
      - name: 난독화 출력 폴더 생성
        run: New-Item -ItemType Directory -Force -Path dist_obf, dist_obf\gui | Out-Null
        shell: pwsh

      - name: PyArmor 버전 확인
        shell: pwsh
        run: |
          Write-Host "PyArmor 버전 확인..."
          pyarmor --version
          Write-Host "✓ PyArmor 준비 완료"

      - name: 난독화 (루트 - 첫 번째 파일 + 런타임)
        shell: pwsh
        run: |
          Write-Host "app_icon.py 난독화 (런타임 생성)..."
          
          # 첫 번째 파일로 pytransform 런타임 생성
          pyarmor obfuscate --output dist_obf app_icon.py
          
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: app_icon.py 난독화 실패"
            Get-ChildItem -Path . -Recurse -Filter "*pytransform*" | Format-Table FullName
            exit $LASTEXITCODE
          }
          
          # pytransform 확인
          if (Test-Path "dist_obf\pytransform") {
            Write-Host "✓ pytransform 런타임 생성 확인됨 (dist_obf\pytransform)"
          } elseif (Test-Path "pytransform") {
            Write-Host "pytransform을 루트에서 발견 → dist_obf로 이동"
            Move-Item pytransform dist_obf\pytransform -Force
            Write-Host "✓ 이동 완료"
          } else {
            Write-Host "⚠ 경고: pytransform이 없습니다. 검색 중..."
            Get-ChildItem -Path . -Recurse -Filter "*pytransform*" -ErrorAction SilentlyContinue | Format-Table FullName
            Write-Host "구조:"
            Get-ChildItem -Path dist_obf -Recurse | Select-Object -First 20
          }
          
          Write-Host "✓ app_icon.py 완료"

      - name: 난독화 (루트 - 나머지 파일)
        shell: pwsh
        run: |
          $files = @(
            "audio_com.py","audio_capture.py",
            "log_utils.py","mem_utils.py","processes.py",
            "win32_utils.py","auth.py","db_manager.py",
            "video_hash.py","similarity.py","series_key.py"
          )
          foreach ($f in $files) {
            Write-Host "난독화 중: $f"
            pyarmor obfuscate --no-runtime --output dist_obf $f
            if ($LASTEXITCODE -ne 0) {
              Write-Host "ERROR: $f 난독화 실패"
              exit $LASTEXITCODE
            }
            Write-Host "✓ $f 완료"
          }
          Write-Host "✓ 모든 루트 파일 난독화 완료"

      - name: 난독화 (gui 패키지)
        shell: pwsh
        run: |
          Write-Host "gui 패키지 난독화 시작..."
          pyarmor obfuscate --no-runtime --recursive --output dist_obf/gui gui/__init__.py
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: gui 패키지 난독화 실패"
            exit $LASTEXITCODE
          }
          Write-Host "✓ gui 패키지 난독화 완료"

      - name: pytransform 런타임 최종 확인
        shell: pwsh
        run: |
          Write-Host "=== dist_obf 최종 구조 ==="
          Get-ChildItem -Path dist_obf -Recurse -Name | Select-Object -First 30
          
          if (-not (Test-Path "dist_obf\pytransform")) {
            Write-Host "ERROR: pytransform 런타임을 찾을 수 없습니다"
            Write-Host "전체 검색:"
            Get-ChildItem -Path . -Recurse -Filter "*pytransform*" -ErrorAction SilentlyContinue | Format-Table FullName
            exit 1
          }
          Write-Host "✓ pytransform 런타임 확인됨"

      # main.py 는 PyInstaller 진입점 — 난독화 제외
      - name: main.py 복사
        shell: pwsh
        run: |
          Copy-Item main.py dist_obf\main.py
          Write-Host "✓ main.py 복사 완료"

      - name: PyInstaller EXE 빌드
        run: >
          pyinstaller
          --clean
          --onefile
          --noconsole
          --name "Auto Sinc"
          --icon "app.ico"
          --version-file "version_info.txt"
          --hidden-import="app_icon"
          --hidden-import="audio_com"
          --hidden-import="audio_capture"
          --hidden-import="log_utils"
          --hidden-import="mem_utils"
          --hidden-import="processes"
          --hidden-import="win32_utils"
          --hidden-import="auth"
          --hidden-import="db_manager"
          --hidden-import="video_hash"
          --hidden-import="similarity"
          --hidden-import="series_key"
          --hidden-import="gui"
          --hidden-import="gui.base"
          --hidden-import="gui.ui_layout"
          --hidden-import="gui.ui_logic"
          --hidden-import="gui.ui_logic2"
          --hidden-import="gui.ui_logic3"
          --hidden-import="gui.auth"
          --hidden-import="gui.run"
          --hidden-import="gui.run_oped"
          --hidden-import="gui.run_process"
          --hidden-import="gui.run_popup"
          --hidden-import="gui.run_notify"
          --hidden-import="gui.run_refresh"
          --hidden-import="gui.record_open"
          --hidden-import="gui.record_backend"
          --hidden-import="gui._record_impl"
          --hidden-import="cv2"
          --hidden-import="sounddevice"
          --hidden-import="scipy.signal"
          --hidden-import="win32api"
          --hidden-import="win32con"
          --hidden-import="win32gui"
          --hidden-import="tkinter"
          --hidden-import="tkinter.messagebox"
          --hidden-import="tkinter.filedialog"
          --hidden-import="multiprocessing"
          --hidden-import="comtypes"
          --hidden-import="comtypes.client"
          --hidden-import="winreg"
          --hidden-import="psutil"
          --hidden-import="mss"
          --hidden-import="pystray"
          --hidden-import="pystray._win32"
          --hidden-import="pystray._base"
          --hidden-import="pystray._util"
          --hidden-import="six"
          --hidden-import="PIL"
          --hidden-import="PIL.Image"
          --hidden-import="PIL._imaging"
          --collect-all PIL
          --copy-metadata Pillow
          --hidden-import="winotify"
          --hidden-import="urllib.request"
          --hidden-import="urllib.parse"
          --hidden-import="uuid"
          --hidden-import="hashlib"
          --hidden-import="platform"
          --hidden-import="pytransform"
          --collect-data cv2
          --paths "dist_obf"
          --add-data "lbpcascade_animeface.xml;."
          --add-data "app.ico;."
          --add-data "ffmpeg.exe;."
          --add-data "dist_obf/pytransform;pytransform"
          --add-data "dist_obf/gui;gui"
          dist_obf/main.py

      - name: 빌드 결과 확인
        run: dir dist\
        shell: cmd

      - name: EXE 업로드
        uses: actions/upload-artifact@v4
        with:
          name: AutoSync-EXE
          path: dist\Auto Sinc.exe
          retention-days: 3
